# Domain whitelist for Claude HPC
#
# Single source of truth — used by both iptables (local Docker) and Squid (Perlmutter).
#
# Format:
#   .domain.com   Squid subdomain wildcard + iptables DNS resolution of domain.com
#   domain.com    Exact match in Squid + iptables DNS resolution
#   @domain.com   Iptables-only: resolved for IP blocking but already covered
#                 by a Squid wildcard above (not added to Squid config)
#
# Comments (#) and blank lines are ignored.

